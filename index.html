<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESH 심사계획 시트</title>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#e2e6eb;--text:#1a1d23;--muted:#7a8394;--accent:#1a56db;--accent-light:#e8f0fe;--red:#ef4444;--radius:10px;--sh:0 2px 12px rgba(0,0,0,.07);--sh-lg:0 8px 32px rgba(0,0,0,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1447b3}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--surface2)}

header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;color:var(--accent)}

main{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
aside{background:var(--surface);border-right:1px solid var(--border);padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:25px}
.sidebar-section h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}

/* 필터 아이템 */
.fi-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .1s}
.fi-item:hover{background:var(--surface2)}
.fi-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.fi-dot{width:10px;height:10px;border-radius:50%}
.fi-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-count{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 6px;border-radius:10px}

/* 달력 */
.content{padding:25px;overflow-y:auto}
.cal-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column}
.cal-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cal-title{font-size:20px;font-weight:800;display:flex;align-items:center;gap:15px}
.cal-grid{display:flex;flex-direction:column}
.day-names{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border)}
.dn{padding:10px;text-align:right;font-size:12px;font-weight:600;color:var(--muted)}
.dn.sun{color:var(--red)}.dn.sat{color:var(--accent)}
.week{display:grid;grid-template-columns:repeat(7,1fr);min-height:120px;border-bottom:1px solid var(--border)}
.cell{border-right:1px solid var(--border);padding:8px;position:relative;background:#fff}
.cell:last-child{border-right:none}
.cell.other{background:#fafafb;color:#ccc}
.cell-num{text-align:right;font-size:13px;font-weight:500;margin-bottom:8px}

.evt-bar{font-size:11px;padding:3px 8px;margin-bottom:2px;border-radius:4px;color:#fff;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.8);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:15px}
.spinner{width:40px;height:40px;border:4px solid var(--accent-light);border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div style="font-weight:600;color:var(--accent)">데이터 동기화 중...</div></div>

<header>
  <div class="logo">📅 <span id="logoTitle">MESH 심사계획 시트</span></div>
  <div class="nav-actions">
    <button class="btn btn-outline" onclick="location.reload()">🔄 새로고침</button>
  </div>
</header>

<main>
  <aside>
    <div class="sidebar-section">
      <h3>업무유형</h3>
      <div id="catList"></div>
    </div>
    <div class="sidebar-section">
      <h3>사업장</h3>
      <div id="siteList"></div>
    </div>
  </aside>

  <section class="content">
    <div class="cal-wrap">
      <div class="cal-head">
        <div class="cal-title">
          <button class="btn btn-outline" onclick="moveMonth(-1)">◀</button>
          <span id="calMonth">2026년 4월</span>
          <button class="btn btn-outline" onclick="moveMonth(1)">▶</button>
          <button class="btn btn-outline" onclick="goToday()">오늘</button>
        </div>
      </div>
      <div class="cal-grid">
        <div class="day-names">
          <div class="dn sun">일</div><div class="dn">월</div><div class="dn">화</div><div class="dn">수</div><div class="dn">목</div><div class="dn">금</div><div class="dn sat">토</div>
        </div>
        <div class="weeks" id="calGrid"></div>
      </div>
    </div>
  </section>
</main>

<script>
// ── 민혁님의 배포 주소 적용 ──
const API_URL = 'https://script.google.com/macros/s/AKfyc...QYfkR/exec'; 

let EVTS = [], CATS = [], SITES = [];
let curDate = new Date();
let activeCat = 'all', activeSite = 'all';

// ── 데이터 로드 (JSONP) ──
async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  const cb = 'callback_' + Date.now();
  
  return new Promise((res) => {
    window[cb] = (d) => {
      // 1. 카테고리 보정 (undefined 방지)
      CATS = [{id:'all', name:'전체', color:'#1a56db'}];
      if (d.cats) {
        d.cats.forEach(c => {
          CATS.push({
            id: c.id || ('cat-' + Math.random()),
            name: c.name || c.label || '이름없음',
            color: c.color || c.dot || '#888'
          });
        });
      }

      // 2. 사업장 보정
      SITES = [{id:'all', name:'전체'}];
      if (d.sites) {
        d.sites.forEach(s => {
          SITES.push({
            id: s.id || ('site-' + Math.random()),
            name: s.name || s.label || '미지정'
          });
        });
      }

      // 3. 일정 보정
      EVTS = (d.evts || []).map(e => ({
        ...e,
        title: e.title || '제목 없음',
        cat: e.cat || 'all',
        sites: Array.isArray(e.sites) ? e.sites : (e.sites ? [e.sites] : [])
      }));

      if (d.title) document.getElementById('logoTitle').textContent = d.title;
      
      document.getElementById('loading').style.display = 'none';
      renderAll();
      res();
    };

    const script = document.createElement('script');
    script.src = `${API_URL}?action=getAll&callback=${cb}`;
    document.body.appendChild(script);
  });
}

function renderAll() {
  renderSidebars();
  renderCal();
}

function renderSidebars() {
  const cl = document.getElementById('catList');
  cl.innerHTML = '';
  CATS.forEach(c => {
    const item = document.createElement('div');
    item.className = `fi-item ${activeCat === c.id ? 'active' : ''}`;
    item.innerHTML = `<div class="fi-dot" style="background:${c.color}"></div><span class="fi-label">${c.name}</span>`;
    item.onclick = () => { activeCat = c.id; renderAll(); };
    cl.appendChild(item);
  });

  const sl = document.getElementById('siteList');
  sl.innerHTML = '';
  SITES.forEach(s => {
    const item = document.createElement('div');
    item.className = `fi-item ${activeSite === s.id ? 'active' : ''}`;
    item.innerHTML = `<div class="fi-dot" style="background:#888"></div><span class="fi-label">${s.name}</span>`;
    item.onclick = () => { activeSite = s.id; renderAll(); };
    sl.appendChild(item);
  });
}

function renderCal() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const y = curDate.getFullYear(), m = curDate.getMonth();
  document.getElementById('calMonth').textContent = `${y}년 ${m + 1}월`;

  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();
  let d = new Date(y, m, 1 - firstDay);

  for (let i = 0; i < 6; i++) {
    const week = document.createElement('div');
    week.className = 'week';
    for (let j = 0; j < 7; j++) {
      const cell = document.createElement('div');
      const isOther = d.getMonth() !== m;
      cell.className = `cell ${isOther ? 'other' : ''} ${j===0?'sun':j===6?'sat':''}`;
      cell.innerHTML = `<div class="cell-num">${d.getDate()}</div>`;
      
      const dateStr = d.toISOString().split('T')[0];
      
      EVTS.filter(e => {
        const mCat = activeCat === 'all' || e.cat === activeCat;
        const mSite = activeSite === 'all' || e.sites.includes(activeSite);
        return e.start.startsWith(dateStr) && mCat && mSite;
      }).forEach(e => {
        const c = CATS.find(cat => cat.id === e.cat) || {color:'#888'};
        const bar = document.createElement('div');
        bar.className = 'evt-bar';
        bar.style.backgroundColor = c.color;
        bar.textContent = e.title;
        cell.appendChild(bar);
      });

      week.appendChild(cell);
      d.setDate(d.getDate() + 1);
    }
    grid.appendChild(week);
    if (d.getMonth() !== m && i >= 4) break;
  }
}

function moveMonth(v) { curDate.setMonth(curDate.getMonth() + v); renderAll(); }
function goToday() { curDate = new Date(); renderAll(); }

window.onload = loadData;
</script>
</body>
</html>
