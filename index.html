<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 공유 캘린더</title>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#e2e6eb;--text:#1a1d23;--muted:#7a8394;--accent:#1a56db;--accent-light:#e8f0fe;--red:#ef4444;--radius:10px;--sh:0 2px 12px rgba(0,0,0,.07);--sh-lg:0 8px 32px rgba(0,0,0,.13)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;user-select:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1447b3}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:#fee2e2;color:#b91c1c}.btn-danger:hover{background:#fecaca}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{font-size:15px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px}
.logo-title{color:var(--text);cursor:pointer;border-bottom:1.5px dashed transparent;transition:border-color .15s}.logo-title:hover{border-bottom-color:var(--accent)}
.logo-input{display:none;font-size:15px;font-weight:700;border:none;border-bottom:2px solid var(--accent);outline:none;background:transparent;color:var(--text);width:180px;font-family:inherit}
.header-actions{display:flex;gap:8px;align-items:center}
.app{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 56px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.sidebar h3{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding:0 4px}
.cat-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:background .12s;position:relative}
.cat-item:hover{background:var(--surface2)}.cat-item.active{background:var(--accent-light);color:var(--accent)}
.cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;cursor:pointer}
.cat-label{flex:1;cursor:text}
.cat-input{display:none;flex:1;font-size:12px;font-weight:500;border:none;border-bottom:1.5px solid var(--accent);outline:none;background:transparent;font-family:inherit;padding:0;min-width:0}
.cat-count{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;margin-left:auto}
.cat-del{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:13px;padding:0 0 0 4px;line-height:1}.cat-del:hover{color:var(--red)}
.cat-add{width:100%;padding:6px;border:1px dashed #c9cdd6;border-radius:6px;background:none;cursor:pointer;font-size:12px;color:var(--muted);font-family:inherit;transition:all .12s;margin-top:2px}
.cat-add:hover{border-color:var(--accent);color:var(--accent)}
.share-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.share-box h4{font-size:12px;font-weight:700;margin-bottom:8px}
.share-row{display:flex;gap:6px}.share-row input{flex:1;font-size:10px;padding:5px 7px;border:1px solid var(--border);border-radius:5px;background:var(--surface);font-family:monospace;color:var(--muted);min-width:0}
.main{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.cal-nav{display:flex;align-items:center;gap:10px}
.month-title{font-size:20px;font-weight:700;letter-spacing:-.5px;min-width:130px}
.nav-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .1s}.nav-btn:hover{background:var(--surface2);color:var(--text)}
.view-toggle{margin-left:auto;display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:3px}
.view-btn{padding:5px 11px;font-size:12px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-weight:500;color:var(--muted);font-family:inherit;transition:all .12s}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cal-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh)}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border)}
.cal-head-cell{text-align:center;padding:9px 0;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted)}
.cal-head-cell:first-child{color:var(--red)}.cal-head-cell:last-child{color:#3b82f6}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:100px;padding:7px 5px 5px;position:relative;cursor:crosshair;transition:background .08s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other-month{background:var(--surface2)}.cal-cell.other-month .cell-date{color:#c9cdd6}
.cal-cell.is-today .cell-date{background:var(--accent);color:#fff;border-radius:50%}
.cal-cell.is-sun .cell-date{color:var(--red)}.cal-cell.is-sat .cell-date{color:#3b82f6}
.cal-cell.dragging{background:#eff6ff !important}
.cell-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.cell-date{font-size:13px;font-weight:600;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cell-holiday{font-size:9px;color:var(--red);font-weight:500;text-align:right;max-width:56px;line-height:1.2}
.cell-events{display:flex;flex-direction:column;gap:2px}
.ev-bar{height:20px;border-radius:4px;font-size:11px;font-weight:600;display:flex;align-items:center;padding:0 6px;white-space:nowrap;overflow:hidden;cursor:pointer;transition:filter .1s;color:#fff}
.ev-bar:hover{filter:brightness(1.1)}
.ev-bar.span-se{border-radius:4px}.ev-bar.span-s{border-radius:4px 0 0 4px;margin-right:-6px}
.ev-bar.span-m{border-radius:0;margin-left:-6px;margin-right:-6px}.ev-bar.span-e{border-radius:0 4px 4px 0;margin-left:-6px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:26px;width:420px;max-width:calc(100vw - 32px);box-shadow:var(--sh-lg);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-hd h2{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);padding:2px 6px;border-radius:5px}.modal-close:hover{background:var(--surface2)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.fi{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);transition:border-color .15s}.fi:focus{outline:none;border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-pills{display:flex;flex-wrap:wrap;gap:6px}
.cat-pill{padding:6px 14px;border-radius:20px;border:2px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;transition:all .12s;font-family:inherit;background:none}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.detail-pop{display:none;position:fixed;z-index:600;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;width:240px;box-shadow:var(--sh-lg);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.detail-pop.open{display:block}.detail-pop h4{font-size:14px;font-weight:700;margin-bottom:5px}.detail-pop p{font-size:12px;color:var(--muted);margin-bottom:3px}
.detail-actions{display:flex;gap:6px;margin-top:10px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1d23;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:2000;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.dual-wrap{display:flex;gap:12px}.dual-wrap .cal-wrap{flex:1;min-width:0}
.dual-label{padding:9px 14px 6px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2)}
.list-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}.list-row:hover{background:#f7f9ff}
</style>
</head>
<body>

<header>
  <div class="logo">
    📅
    <span class="logo-title" id="logoTitle" onclick="startEditTitle()">일정 공유 캘린더</span>
    <input class="logo-input" id="logoInput" maxlength="30"
      onblur="finishTitle()"
      onkeydown="if(event.key==='Enter')finishTitle();if(event.key==='Escape')cancelTitle()">
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportICS()">📤 내보내기</button>
    <button class="btn btn-ghost" onclick="shareCalendar()">🔗 공유</button>
    <button class="btn btn-primary" onclick="openAdd(null)">+ 일정 추가</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div><h3>날짜 이동</h3><div id="miniCal"></div></div>
    <div><h3>카테고리</h3><div id="catList"></div></div>
    <div class="share-box">
      <h4>🔗 공유 링크</h4>
      <div class="share-row">
        <input id="shareUrl" readonly placeholder="공유 버튼을 누르세요">
        <button class="btn btn-ghost" style="padding:5px 9px;font-size:12px" onclick="copyShare()">복사</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="cal-nav">
      <button class="nav-btn" onclick="prevM()">‹</button>
      <button class="nav-btn" onclick="nextM()">›</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="btn btn-ghost" style="font-size:12px;padding:6px 11px" onclick="goToday()">오늘</button>
      <div class="view-toggle">
        <button class="view-btn active" id="vMonth" onclick="setView('month')">월</button>
        <button class="view-btn" id="vDual" onclick="setView('dual')">2개월</button>
        <button class="view-btn" id="vList" onclick="setView('list')">목록</button>
      </div>
    </div>
    <div id="calContainer"></div>
  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <h2 id="mTitle">일정 추가</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="fg"><label>일정명 *</label><input class="fi" id="fTitle" maxlength="40" placeholder="예) 청양 공장 점검"></div>
    <div class="fg"><label>카테고리</label><div class="cat-pills" id="catPills"></div></div>
    <div class="frow fg">
      <div><label>시작일 *</label><input type="date" class="fi" id="fStart"></div>
      <div><label>종료일 *</label><input type="date" class="fi" id="fEnd"></div>
    </div>
    <div class="fg"><label>담당자 / 메모</label><input class="fi" id="fNote" maxlength="80" placeholder="예) 홍길동 / 안전점검"></div>
    <div class="modal-ft">
      <button class="btn btn-danger" id="delBtn" style="display:none;margin-right:auto" onclick="deleteEvt()">삭제</button>
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEvt()">저장</button>
    </div>
  </div>
</div>

<!-- DETAIL POPUP -->
<div class="detail-pop" id="detailPop">
  <h4 id="dpTitle"></h4>
  <p id="dpDate"></p>
  <p id="dpNote"></p>
  <div class="detail-actions">
    <button class="btn btn-ghost" style="font-size:12px;padding:5px 9px" onclick="editFromDetail()">✏️ 수정</button>
    <button class="btn btn-danger" style="font-size:12px;padding:5px 9px" onclick="delFromDetail()">🗑️ 삭제</button>
    <button class="btn btn-ghost" style="font-size:12px;padding:5px 9px;margin-left:auto" onclick="closeDetail()">✕</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──
const S={
  get(k){try{return localStorage.getItem(k)}catch{return null}},
  set(k,v){try{localStorage.setItem(k,v)}catch{}}
};

// ── HOLIDAYS ──
const HOL={'2026-01-01':'신정','2026-01-28':'설날','2026-01-29':'설날','2026-01-30':'설날','2026-03-01':'삼일절','2026-05-01':'노동절','2026-05-05':'어린이날','2026-05-25':'부처님오신날','2026-06-06':'현충일','2026-08-15':'광복절','2026-09-24':'추석','2026-09-25':'추석','2026-09-26':'추석','2026-10-03':'개천절','2026-10-09':'한글날','2026-12-25':'크리스마스'};

// ── CATEGORIES ──
const CCOLS=['#1e6fb5','#1a7a4a','#c2570a','#6d28d9','#b91c1c','#0e7490','#4f46e5','#be185d','#065f46'];
const DCATS=[{id:'all',label:'전체 일정',dot:'#7a8394',fixed:true},{id:'cat-blue',label:'점검',dot:'#1e6fb5'},{id:'cat-green',label:'교육',dot:'#1a7a4a'},{id:'cat-orange',label:'회의',dot:'#c2570a'},{id:'cat-purple',label:'기타',dot:'#6d28d9'}];
let CATS=(()=>{try{const s=S.get('cal_cats');return s?JSON.parse(s):DCATS}catch{return DCATS}})();
function saveCats(){S.set('cal_cats',JSON.stringify(CATS))}

// ── EVENTS ──
const DEVTS=[{id:'e1',title:'영동',cat:'cat-blue',start:'2026-04-27',end:'2026-04-29',note:''},{id:'e2',title:'경산',cat:'cat-green',start:'2026-04-28',end:'2026-04-30',note:''},{id:'e3',title:'아산',cat:'cat-blue',start:'2026-05-07',end:'2026-05-08',note:''},{id:'e4',title:'MIC',cat:'cat-green',start:'2026-05-08',end:'2026-05-09',note:''},{id:'e5',title:'청양',cat:'cat-blue',start:'2026-05-11',end:'2026-05-14',note:''},{id:'e6',title:'평택',cat:'cat-green',start:'2026-05-12',end:'2026-05-14',note:''},{id:'e7',title:'광주',cat:'cat-blue',start:'2026-05-18',end:'2026-05-20',note:''},{id:'e8',title:'상하',cat:'cat-green',start:'2026-05-19',end:'2026-05-21',note:''}];
let EVTS=(()=>{try{const s=S.get('cal_evts');return s?JSON.parse(s):DEVTS}catch{return DEVTS}})();
function saveEvts(){S.set('cal_evts',JSON.stringify(EVTS))}

// ── STATE ──
const TODAY=new Date();
let curY=TODAY.getFullYear(),curM=TODAY.getMonth();
let miniY=curY,miniM=curM;
let activeFilter='all',currentView='month';
let editingId=null,detailId=null,selCat='cat-blue';
let dragStart=null,dragEnd=null,isDragging=false;

// ── HELPERS ──
function fmt(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function pDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function uid(){return 'e'+Date.now()+Math.random().toString(36).slice(2,5)}
function todayStr(){return fmt(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate())}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

// ── TITLE ──
function startEditTitle(){const sp=document.getElementById('logoTitle'),inp=document.getElementById('logoInput');inp.value=sp.textContent;sp.style.display='none';inp.style.display='';inp.focus();inp.select()}
function finishTitle(){const sp=document.getElementById('logoTitle'),inp=document.getElementById('logoInput');const v=inp.value.trim();if(v){sp.textContent=v;document.title=v;S.set('cal_title',v)}inp.style.display='none';sp.style.display=''}
function cancelTitle(){document.getElementById('logoInput').style.display='none';document.getElementById('logoTitle').style.display=''}

// ── MINI CAL ──
function renderMini(){
  const evDates=new Set(EVTS.flatMap(e=>{const ds=[];let d=pDate(e.start);const en=pDate(e.end);while(d<=en){ds.push(fmt(d.getFullYear(),d.getMonth(),d.getDate()));d.setDate(d.getDate()+1)}return ds}));
  const first=new Date(miniY,miniM,1).getDay();
  const dim=new Date(miniY,miniM+1,0).getDate();
  const dimp=new Date(miniY,miniM,0).getDate();
  const ts=todayStr();
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px;font-weight:600">
    <button onclick="miniPrev()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 6px;border-radius:4px">‹</button>
    <span>${miniY}.${String(miniM+1).padStart(2,'0')}</span>
    <button onclick="miniNext()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 6px;border-radius:4px">›</button>
  </div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">
  ${['일','월','화','수','목','금','토'].map((d,i)=>`<div style="font-size:10px;font-weight:700;color:${i===0?'var(--red)':i===6?'#3b82f6':'var(--muted)'};padding:2px 0">${d}</div>`).join('')}`;
  for(let i=0;i<first;i++) h+=`<div style="font-size:11px;padding:3px;color:#c9cdd6">${dimp-first+1+i}</div>`;
  for(let d=1;d<=dim;d++){
    const ds=fmt(miniY,miniM,d),dow=new Date(miniY,miniM,d).getDay(),isT=ds===ts;
    const clr=dow===0?'var(--red)':dow===6?'#3b82f6':'var(--text)';
    const dot=evDates.has(ds)&&!isT?`<div style="width:4px;height:4px;border-radius:50%;background:var(--accent);margin:0 auto"></div>`:'';
    h+=`<div onclick="curY=${miniY};curM=${miniM};renderAll()" style="font-size:11px;padding:3px 1px;border-radius:4px;cursor:pointer;background:${isT?'var(--accent)':'transparent'};color:${isT?'#fff':clr}">${d}${dot}</div>`;
  }
  h+=`</div>`;
  document.getElementById('miniCal').innerHTML=h;
}
function miniPrev(){miniM--;if(miniM<0){miniM=11;miniY--;}renderMini()}
function miniNext(){miniM++;if(miniM>11){miniM=0;miniY++;}renderMini()}

// ── CATEGORY SIDEBAR ──
function renderCatList(){
  const list=document.getElementById('catList');
  list.innerHTML='';
  CATS.forEach(cat=>{
    const cnt=cat.id==='all'?EVTS.length:EVTS.filter(e=>e.cat===cat.id).length;
    const item=document.createElement('div');
    item.className='cat-item'+(activeFilter===cat.id?' active':'');
    if(cat.fixed){
      item.innerHTML=`<div class="cat-dot" style="background:${cat.dot}"></div><span style="flex:1">${cat.label}</span><span class="cat-count">${cnt}</span>`;
      item.onclick=()=>{activeFilter=cat.id;renderAll()};
    } else {
      item.innerHTML=`
        <div class="cat-dot" title="색상 변경" style="background:${cat.dot}" onclick="event.stopPropagation();cycleCatColor('${cat.id}')"></div>
        <span class="cat-label" id="cl_${cat.id}" title="이름 변경 (클릭)" onclick="event.stopPropagation();startEditCat('${cat.id}')">${cat.label}</span>
        <input class="cat-input" id="ci_${cat.id}" maxlength="10" value="${cat.label}"
          onblur="finishEditCat('${cat.id}')"
          onkeydown="if(event.key==='Enter')finishEditCat('${cat.id}');if(event.key==='Escape')cancelEditCat('${cat.id}')"
          onclick="event.stopPropagation()">
        <span class="cat-count">${cnt}</span>
        ${cnt===0?`<button class="cat-del" onclick="event.stopPropagation();deleteCat('${cat.id}')" title="삭제">✕</button>`:''}`;
      item.onclick=()=>{activeFilter=cat.id;renderAll()};
    }
    list.appendChild(item);
  });
  const ab=document.createElement('button');
  ab.className='cat-add';ab.textContent='+ 카테고리 추가';ab.onclick=addCat;
  list.appendChild(ab);
}
function startEditCat(id){document.getElementById('cl_'+id).style.display='none';const i=document.getElementById('ci_'+id);i.style.display='block';i.focus();i.select()}
function finishEditCat(id){const i=document.getElementById('ci_'+id);const v=i.value.trim();if(v){const c=CATS.find(x=>x.id===id);if(c){c.label=v;saveCats()}}renderAll()}
function cancelEditCat(id){renderAll()}
function cycleCatColor(id){const c=CATS.find(x=>x.id===id);if(!c)return;const idx=CCOLS.indexOf(c.dot);c.dot=CCOLS[(idx+1)%CCOLS.length];saveCats();renderAll()}
function addCat(){
  const usedIds=CATS.map(c=>c.id);
  const cands=['cat-red','cat-teal','cat-indigo','cat-pink','cat-emerald','cat-lime','cat-sky'];
  const nid=cands.find(i=>!usedIds.includes(i))||('cat-'+uid());
  const col=CCOLS[(CATS.length-1)%CCOLS.length];
  CATS.push({id:nid,label:'새 카테고리',dot:col});
  saveCats();renderAll();setTimeout(()=>startEditCat(nid),50);
}
function deleteCat(id){CATS=CATS.filter(c=>c.id!==id);if(activeFilter===id)activeFilter='all';saveCats();renderAll()}

// ── MODAL CAT PILLS ──
function renderCatPills(){
  const wrap=document.getElementById('catPills');wrap.innerHTML='';
  CATS.filter(c=>!c.fixed).forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-pill';btn.textContent=cat.label;btn.dataset.id=cat.id;
    const isSel=selCat===cat.id;
    btn.style.borderColor=cat.dot;
    btn.style.color=isSel?'#fff':cat.dot;
    btn.style.background=isSel?cat.dot:'transparent';
    btn.onclick=()=>{selCat=cat.id;renderCatPills()};
    wrap.appendChild(btn);
  });
}

// ── MODAL OPEN/CLOSE ──
function openAdd(dateStr){
  editingId=null;
  document.getElementById('mTitle').textContent='일정 추가';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('fTitle').value='';
  document.getElementById('fNote').value='';
  const d=dateStr||fmt(curY,curM,TODAY.getDate());
  document.getElementById('fStart').value=d;
  document.getElementById('fEnd').value=d;
  selCat=CATS.find(c=>!c.fixed)?.id||'cat-blue';
  renderCatPills();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),80);
}
function openAddRange(s,e){
  editingId=null;
  document.getElementById('mTitle').textContent='일정 추가';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('fTitle').value='';
  document.getElementById('fNote').value='';
  document.getElementById('fStart').value=s;
  document.getElementById('fEnd').value=e;
  selCat=CATS.find(c=>!c.fixed)?.id||'cat-blue';
  renderCatPills();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),80);
}
function openEdit(id){
  const ev=EVTS.find(x=>x.id===id);if(!ev)return;
  editingId=id;selCat=ev.cat;
  document.getElementById('mTitle').textContent='일정 수정';
  document.getElementById('delBtn').style.display='';
  document.getElementById('fTitle').value=ev.title;
  document.getElementById('fNote').value=ev.note||'';
  document.getElementById('fStart').value=ev.start;
  document.getElementById('fEnd').value=ev.end;
  renderCatPills();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),80);
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayBg(e){if(e.target===document.getElementById('overlay'))closeModal()}
function saveEvt(){
  const title=document.getElementById('fTitle').value.trim();
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const note=document.getElementById('fNote').value.trim();
  if(!title){document.getElementById('fTitle').focus();toast('일정명을 입력하세요.');return}
  if(!start||!end){toast('날짜를 선택하세요.');return}
  if(start>end){toast('종료일이 시작일보다 빠릅니다.');return}
  if(editingId){
    const idx=EVTS.findIndex(e=>e.id===editingId);
    if(idx>=0)EVTS[idx]={...EVTS[idx],title,cat:selCat,start,end,note};
    toast('일정이 수정되었습니다.');
  } else {
    EVTS.push({id:uid(),title,cat:selCat,start,end,note});
    toast('일정이 추가되었습니다.');
  }
  saveEvts();closeModal();renderAll();
}
function deleteEvt(){if(!editingId)return;EVTS=EVTS.filter(e=>e.id!==editingId);saveEvts();closeModal();renderAll();toast('삭제되었습니다.')}

// ── DETAIL POPUP ──
function showDetail(id,ev){
  const e=EVTS.find(x=>x.id===id);if(!e)return;
  detailId=id;
  const cat=CATS.find(c=>c.id===e.cat);
  document.getElementById('dpTitle').innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${cat?.dot||'#888'};margin-right:6px;vertical-align:middle"></span>${e.title}`;
  document.getElementById('dpDate').textContent=`📅 ${e.start}${e.start!==e.end?' ~ '+e.end:''}`;
  document.getElementById('dpNote').textContent=e.note?`📝 ${e.note}`:'';
  const pop=document.getElementById('detailPop');pop.classList.add('open');
  const r=ev.target.getBoundingClientRect();
  let top=r.bottom+8,left=r.left;
  if(left+250>window.innerWidth)left=window.innerWidth-258;
  if(top+170>window.innerHeight)top=r.top-180;
  pop.style.top=top+'px';pop.style.left=left+'px';
}
function closeDetail(){document.getElementById('detailPop').classList.remove('open');detailId=null}
function editFromDetail(){if(!detailId)return;const id=detailId;closeDetail();openEdit(id)}
function delFromDetail(){if(!detailId)return;EVTS=EVTS.filter(e=>e.id!==detailId);saveEvts();closeDetail();renderAll();toast('삭제되었습니다.')}
document.addEventListener('click',e=>{const pop=document.getElementById('detailPop');if(pop.classList.contains('open')&&!pop.contains(e.target))closeDetail()});

// ── DRAG TO SELECT ──
function attachDrag(bodyEl){
  let ds=null,de=null,dragging=false;
  bodyEl.addEventListener('mousedown',e=>{
    const cell=e.target.closest('.cal-cell');
    if(!cell||!cell.dataset.date)return;
    if(e.target.closest('.ev-bar'))return;
    dragging=true;ds=cell.dataset.date;de=cell.dataset.date;
    highlight(bodyEl,ds,de);e.preventDefault();
  });
  bodyEl.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const cell=e.target.closest('.cal-cell');
    if(!cell||!cell.dataset.date)return;
    de=cell.dataset.date;highlight(bodyEl,ds,de);
  });
  const finish=()=>{
    if(!dragging)return;
    dragging=false;clearHL(bodyEl);
    if(ds&&de){
      const lo=ds<de?ds:de,hi=ds<de?de:ds;
      if(lo===hi)openAdd(lo);else openAddRange(lo,hi);
    }
    ds=null;de=null;
  };
  bodyEl.addEventListener('mouseup',finish);
  document.addEventListener('mouseup',finish,{once:false});
}
function highlight(body,s,e){const lo=s<e?s:e,hi=s<e?e:s;body.querySelectorAll('.cal-cell').forEach(c=>{const d=c.dataset.date;c.classList.toggle('dragging',!!(d&&d>=lo&&d<=hi))})}
function clearHL(body){body.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('dragging'))}

// ── BUILD MONTH GRID ──
function getFiltered(){return activeFilter==='all'?EVTS:EVTS.filter(e=>e.cat===activeFilter)}

function buildGrid(year,month,bodyEl){
  const first=new Date(year,month,1).getDay();
  const dim=new Date(year,month+1,0).getDate();
  const dimp=new Date(year,month,0).getDate();
  const ts=todayStr();
  const filtered=getFiltered();
  const weeks=Math.ceil((first+dim)/7);

  for(let row=0;row<weeks;row++){
    const wCells=[];
    for(let col=0;col<7;col++){
      const idx=row*7+col,dn=idx-first+1;
      let y=year,m=month,d=dn,other=false;
      if(dn<1){m=month-1;if(m<0){m=11;y--}d=dimp-first+1+idx;other=true}
      else if(dn>dim){m=month+1;if(m>11){m=0;y++}d=dn-dim;other=true}
      wCells.push({y,m,d,ds:fmt(y,m,d),other,col});
    }
    const wS=pDate(wCells[0].ds),wE=pDate(wCells[6].ds);
    const wEvts=filtered.filter(e=>{const s=pDate(e.start),en=pDate(e.end);return s<=wE&&en>=wS})
      .sort((a,b)=>(pDate(b.end)-pDate(b.start))-(pDate(a.end)-pDate(a.start)));

    // slot assignment
    const slots={},evtSlot={};
    wEvts.forEach(e=>{
      const s=pDate(e.start),en=pDate(e.end);
      const sc=Math.max(0,Math.round((s-wS)/86400000));
      const ec=Math.min(6,Math.round((en-wS)/86400000));
      let slot=0;
      outer:while(true){for(let c=sc;c<=ec;c++)if((slots[c]||[])[slot]){slot++;continue outer}break}
      evtSlot[e.id]={slot,sc,ec};
      for(let c=sc;c<=ec;c++){if(!slots[c])slots[c]=[];slots[c][slot]=e.id}
    });

    const frag=document.createDocumentFragment();
    wCells.forEach(({y,m,d,ds,other,col})=>{
      const dow=new Date(y,m,d).getDay();
      const isHol=!!HOL[ds];
      const cell=document.createElement('div');
      cell.className='cal-cell'+(other?' other-month':'')+(ds===ts?' is-today':'')+(dow===0||isHol?' is-sun':dow===6?' is-sat':'');
      cell.dataset.date=ds;

      const top=document.createElement('div');top.className='cell-top';
      const de2=document.createElement('div');de2.className='cell-date';de2.textContent=d;
      top.appendChild(de2);
      if(isHol){const hl=document.createElement('div');hl.className='cell-holiday';hl.textContent=HOL[ds];top.appendChild(hl)}
      cell.appendChild(top);

      const evWrap=document.createElement('div');evWrap.className='cell-events';
      const colEvts=wEvts.filter(e=>{const{sc,ec}=evtSlot[e.id];return col>=sc&&col<=ec}).sort((a,b)=>evtSlot[a.id].slot-evtSlot[b.id].slot);
      let lastSlot=-1;
      colEvts.forEach(e=>{
        const{slot,sc,ec}=evtSlot[e.id];
        for(let s=lastSlot+1;s<slot;s++){const sp=document.createElement('div');sp.style.cssText='height:20px;margin-bottom:2px';evWrap.appendChild(sp)}
        lastSlot=slot;
        const cat=CATS.find(c=>c.id===e.cat);
        const isS=col===sc,isE=col===ec;
        const bar=document.createElement('div');
        bar.className='ev-bar '+(isS&&isE?'span-se':isS?'span-s':isE?'span-e':'span-m');
        bar.style.background=cat?.dot||'#888';
        bar.textContent=isS?e.title:'';
        bar.title=e.title;
        bar.addEventListener('click',ev=>{ev.stopPropagation();showDetail(e.id,ev)});
        evWrap.appendChild(bar);
      });
      cell.appendChild(evWrap);
      cell.addEventListener('click',()=>closeDetail());
      frag.appendChild(cell);
    });
    bodyEl.appendChild(frag);
  }
  attachDrag(bodyEl);
}

// ── VIEWS ──
function setView(v){
  currentView=v;
  ['Month','Dual','List'].forEach(n=>{const el=document.getElementById('v'+n);if(el)el.classList.toggle('active',v===n.toLowerCase())});
  renderMain();
}
function renderMain(){
  if(currentView==='month')renderMonth();
  else if(currentView==='dual')renderDual();
  else renderList();
}
function renderMonth(){
  document.getElementById('monthTitle').textContent=`${curY}년 ${curM+1}월`;
  const con=document.getElementById('calContainer');
  con.style.display='';con.innerHTML='';
  const wrap=document.createElement('div');wrap.className='cal-wrap';
  const hd=document.createElement('div');hd.className='cal-head';
  hd.innerHTML=['일','월','화','수','목','금','토'].map(d=>`<div class="cal-head-cell">${d}</div>`).join('');
  const body=document.createElement('div');body.className='cal-body';
  wrap.appendChild(hd);wrap.appendChild(body);con.appendChild(wrap);
  buildGrid(curY,curM,body);
}
function renderDual(){
  let y2=curY,m2=curM+1;if(m2>11){m2=0;y2++}
  document.getElementById('monthTitle').textContent=`${curY}년 ${curM+1}월 — ${y2}년 ${m2+1}월`;
  const con=document.getElementById('calContainer');
  con.innerHTML='';con.style.display='flex';con.style.gap='12px';
  [{y:curY,m:curM},{y:y2,m:m2}].forEach(({y,m})=>{
    const wrap=document.createElement('div');wrap.className='cal-wrap';wrap.style.flex='1';wrap.style.minWidth='0';
    const lbl=document.createElement('div');lbl.className='dual-label';lbl.textContent=`${y}년 ${m+1}월`;
    const hd=document.createElement('div');hd.className='cal-head';
    hd.innerHTML=['일','월','화','수','목','금','토'].map(d=>`<div class="cal-head-cell">${d}</div>`).join('');
    const body=document.createElement('div');body.className='cal-body';
    wrap.appendChild(lbl);wrap.appendChild(hd);wrap.appendChild(body);con.appendChild(wrap);
    buildGrid(y,m,body);
  });
}
function renderList(){
  document.getElementById('monthTitle').textContent=`${curY}년 ${curM+1}월`;
  const con=document.getElementById('calContainer');con.style.display='';con.innerHTML='';
  const ms=`${curY}-${String(curM+1).padStart(2,'0')}`;
  const filtered=getFiltered().filter(e=>e.start.startsWith(ms)||e.end.startsWith(ms)).sort((a,b)=>a.start.localeCompare(b.start));
  const wrap=document.createElement('div');wrap.className='cal-wrap';
  if(!filtered.length){wrap.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">이번 달 일정이 없습니다.</div>'}
  else filtered.forEach(e=>{
    const cat=CATS.find(c=>c.id===e.cat);
    const row=document.createElement('div');row.className='list-row';
    row.innerHTML=`<div style="width:10px;height:10px;border-radius:3px;background:${cat?.dot||'#888'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">${e.title}</div>${e.note?`<div style="font-size:12px;color:var(--muted);margin-top:1px">${e.note}</div>`:''}</div><div style="font-size:12px;color:var(--muted);white-space:nowrap">${e.start}${e.start!==e.end?' ~ '+e.end:''}</div>`;
    row.addEventListener('click',ev=>showDetail(e.id,ev));
    wrap.appendChild(row);
  });
  con.appendChild(wrap);
}

// ── NAV ──
function prevM(){curM--;if(curM<0){curM=11;curY--}renderAll()}
function nextM(){curM++;if(curM>11){curM=0;curY++}renderAll()}
function goToday(){curY=TODAY.getFullYear();curM=TODAY.getMonth();miniY=curY;miniM=curM;renderAll()}

// ── SHARE / EXPORT ──
function shareCalendar(){
  const data=btoa(encodeURIComponent(JSON.stringify(EVTS)));
  const url=location.href.split('?')[0]+'?data='+data;
  document.getElementById('shareUrl').value=url;
  navigator.clipboard?.writeText(url).catch(()=>{});
  toast('🔗 공유 링크가 복사되었습니다!');
}
function copyShare(){const v=document.getElementById('shareUrl').value;if(v){navigator.clipboard?.writeText(v);toast('복사되었습니다!')}else shareCalendar()}
function exportICS(){
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Schedule Calendar//KR\r\n';
  EVTS.forEach(e=>{ics+='BEGIN:VEVENT\r\n';ics+=`DTSTART;VALUE=DATE:${e.start.replace(/-/g,'')}\r\n`;const ed=new Date(pDate(e.end));ed.setDate(ed.getDate()+1);ics+=`DTEND;VALUE=DATE:${fmt(ed.getFullYear(),ed.getMonth(),ed.getDate()).replace(/-/g,'')}\r\n`;ics+=`SUMMARY:${e.title}\r\n`;if(e.note)ics+=`DESCRIPTION:${e.note}\r\n`;ics+='END:VEVENT\r\n'});
  ics+='END:VCALENDAR';
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download='schedule.ics';a.click();toast('📤 ICS 파일 다운로드');
}

// ── RENDER ALL ──
function renderAll(){renderMini();renderCatList();renderMain();document.getElementById('shareUrl').value=''}

(function(){
  try{const p=new URLSearchParams(location.search).get('data');if(p){EVTS=JSON.parse(decodeURIComponent(atob(p)));saveEvts()}}catch{}
  const t=S.get('cal_title');if(t){document.getElementById('logoTitle').textContent=t;document.title=t}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeDetail()}
  if(!document.getElementById('overlay').classList.contains('open')){
    if(e.key==='ArrowLeft')prevM();
    if(e.key==='ArrowRight')nextM();
  }
