<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 공유 캘린더</title>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#e2e6eb;--text:#1a1d23;--muted:#7a8394;--accent:#1a56db;--accent-light:#e8f0fe;--red:#ef4444;--radius:10px;--sh:0 2px 12px rgba(0,0,0,.07);--sh-lg:0 8px 32px rgba(0,0,0,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1447b3}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:#fee2e2;color:#b91c1c}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:12px}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:300;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cal-body,.cal-cell,.ev-bar,.sidebar,.fi-item{user-select:none}
.logo{font-size:15px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px}
.logo span{color:var(--text)}
.header-actions{display:flex;gap:8px;align-items:center}

/* LAYOUT */
.app{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px)}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 13px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.sb-section h3{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding:0 4px}
.sb-section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sb-section-hd h3{margin-bottom:0}

/* filter items (카테고리 & 사업장 공통) */
.fi-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:background .12s;position:relative}
.fi-item:hover{background:var(--surface2)}.fi-item.active{background:var(--accent-light);color:var(--accent)}
.fi-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;cursor:pointer;transition:transform .1s}.fi-dot:hover{transform:scale(1.3)}
.fi-label{flex:1;cursor:text;line-height:1.3}
.fi-input{display:none;flex:1;font-size:12px;font-weight:500;border:none;border-bottom:1.5px solid var(--accent);outline:none;background:transparent;font-family:inherit;padding:0;min-width:0}
.fi-count{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;margin-left:auto;flex-shrink:0}
.fi-del{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:12px;padding:0 0 0 3px;line-height:1;flex-shrink:0}.fi-del:hover{color:var(--red)}
.fi-add{width:100%;padding:5px;border:1px dashed #c9cdd6;border-radius:6px;background:none;cursor:pointer;font-size:12px;color:var(--muted);font-family:inherit;transition:all .12s;margin-top:2px}
.fi-add:hover{border-color:var(--accent);color:var(--accent)}

/* share box */
.share-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.share-box h4{font-size:12px;font-weight:700;margin-bottom:8px}
.share-row{display:flex;gap:6px}.share-row input{flex:1;font-size:10px;padding:5px 7px;border:1px solid var(--border);border-radius:5px;background:var(--surface);font-family:monospace;color:var(--muted);min-width:0}

/* MAIN */
.main{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.cal-nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.month-title{font-size:20px;font-weight:700;letter-spacing:-.5px;min-width:120px}
.nav-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .1s}.nav-btn:hover{background:var(--surface2);color:var(--text)}
.view-toggle{margin-left:auto;display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:3px}
.view-btn{padding:5px 11px;font-size:12px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-weight:500;color:var(--muted);font-family:inherit;transition:all .12s}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.filter-bar span{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.f-chip{padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .12s;white-space:nowrap}
.f-chip:hover{border-color:var(--accent);color:var(--accent)}
.f-chip.on{color:#fff;border-color:transparent}

/* CALENDAR */
.cal-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh)}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border)}
.cal-head-cell{text-align:center;padding:9px 0;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted)}
.cal-head-cell:first-child{color:var(--red)}.cal-head-cell:last-child{color:#3b82f6}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:100px;padding:7px 5px 5px;position:relative;cursor:crosshair;transition:background .08s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other-month{background:var(--surface2)}.cal-cell.other-month .cell-date{color:#c9cdd6}
.cal-cell.is-today .cell-date{background:var(--accent);color:#fff;border-radius:50%}
.cal-cell.is-sun .cell-date{color:var(--red)}.cal-cell.is-sat .cell-date{color:#3b82f6}
.cal-cell.dragging{background:#eff6ff !important}
.cell-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.cell-date{font-size:13px;font-weight:600;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cell-holiday{font-size:9px;color:var(--red);font-weight:500;text-align:right;max-width:56px;line-height:1.2}
.cell-events{display:flex;flex-direction:column;gap:2px}
.ev-bar{height:20px;border-radius:4px;font-size:11px;font-weight:600;display:flex;align-items:center;padding:0 6px;white-space:nowrap;overflow:hidden;cursor:pointer;transition:filter .1s;color:#fff;gap:4px}
.ev-bar:hover{filter:brightness(1.1)}
.ev-site-badge{font-size:9px;font-weight:700;opacity:.85;background:rgba(0,0,0,.18);border-radius:3px;padding:1px 4px;flex-shrink:0}
.ev-bar.span-se{border-radius:4px}.ev-bar.span-s{border-radius:4px 0 0 4px;margin-right:-6px}
.ev-bar.span-m{border-radius:0;margin-left:-6px;margin-right:-6px}.ev-bar.span-e{border-radius:0 4px 4px 0;margin-left:-6px}
.dual-wrap{display:flex;gap:12px}.dual-wrap .cal-wrap{flex:1;min-width:0}
.dual-label{padding:9px 14px 6px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2)}

/* LIST VIEW */
.list-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}.list-row:hover{background:#f7f9ff}
.list-badges{display:flex;gap:5px;flex-shrink:0}
.list-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:26px;width:460px;max-width:calc(100vw - 32px);box-shadow:var(--sh-lg);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-hd h2{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);padding:2px 6px;border-radius:5px}.modal-close:hover{background:var(--surface2)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.fi2{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);transition:border-color .15s}.fi2:focus{outline:none;border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pill-group{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:6px 13px;border-radius:20px;border:2px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;transition:all .12s;font-family:inherit;background:none}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* SETTINGS MODAL */
.settings-modal{width:520px}
.stab{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:18px}
.stab-btn{flex:1;padding:6px;font-size:12px;font-weight:600;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);font-family:inherit;transition:all .12s}
.stab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stab-panel{display:none}.stab-panel.active{display:block}
.master-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--surface)}
.master-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;cursor:pointer;transition:transform .1s}.master-dot:hover{transform:scale(1.25)}
.master-label{flex:1;font-size:13px;font-weight:500}
.master-input{display:none;flex:1;font-size:13px;font-weight:500;border:none;border-bottom:1.5px solid var(--accent);outline:none;background:transparent;font-family:inherit;padding:0}
.master-del{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:14px;padding:0 2px}.master-del:hover{color:var(--red)}
.master-add{width:100%;padding:8px;border:1px dashed #c9cdd6;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:var(--muted);font-family:inherit;transition:all .12s;margin-top:4px}
.master-add:hover{border-color:var(--accent);color:var(--accent)}

/* AUDITOR STATS */
.auditor-group{margin-bottom:10px}
.auditor-group-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;padding:0 2px}
.auditor-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.auditor-card{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;display:flex;flex-direction:column;gap:2px}
.auditor-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.auditor-count{font-size:18px;font-weight:700;color:var(--accent);line-height:1}
.auditor-unit{font-size:10px;color:var(--muted)}
.auditor-bar{height:3px;border-radius:2px;background:var(--border);margin-top:4px;overflow:hidden}
.auditor-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1d23;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:2000;opacity:0;transform:translateY(8px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<header>
  <div class="logo">
    📅 <span id="logoTitle">일정 공유 캘린더</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="checkPassword()">⚙️ 기준정보</button>
    <button class="btn btn-ghost" onclick="exportICS()">📤 내보내기</button>
    <button class="btn btn-ghost" onclick="shareCalendar()">🔗 공유</button>
    <button class="btn btn-primary" onclick="openAdd(null,null)">+ 일정 추가</button>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- 미니달력 -->
    <div class="sb-section"><h3>날짜 이동</h3><div id="miniCal"></div></div>

    <!-- 업무유형 필터 -->
    <div class="sb-section">
      <div class="sb-section-hd">
        <h3>업무유형</h3>
      </div>
      <div id="catList"></div>
    </div>

    <!-- 사업장 필터 -->
    <div class="sb-section">
      <div class="sb-section-hd">
        <h3>사업장</h3>
      </div>
      <div id="siteList"></div>
    </div>

    <!-- 심사원 현황 -->
    <div class="sb-section">
      <h3>심사원 현황</h3>
      <div id="auditorStats"></div>
    </div>

    <!-- 공유 링크 -->
    <div class="share-box">
      <h4>🔗 공유 링크</h4>
      <div class="share-row">
        <input id="shareUrl" readonly placeholder="공유 버튼을 누르세요">
        <button class="btn btn-ghost btn-sm" onclick="copyShare()">복사</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="cal-nav">
      <button class="nav-btn" onclick="prevM()">‹</button>
      <button class="nav-btn" onclick="nextM()">›</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="btn btn-ghost btn-sm" onclick="goToday()">오늘</button>
      <div class="view-toggle">
        <button class="view-btn active" id="vMonth" onclick="setView('month')">월</button>
        <button class="view-btn" id="vDual" onclick="setView('dual')">2개월</button>
        <button class="view-btn" id="vList" onclick="setView('list')">목록</button>
      </div>
    </div>
    <div id="calContainer"></div>
  </main>
</div>

<!-- ── 일정 추가/수정 MODAL ── -->
<div class="overlay" id="overlay" onclick="overlayBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <h2 id="mTitle">일정 추가</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="fg"><label>일정명 *</label><input class="fi2" id="fEvtTitle" maxlength="40" placeholder="예) 안전점검"></div>

    <div class="frow fg">
      <div><label>시작일 *</label><input type="date" class="fi2" id="fStart"></div>
      <div><label>종료일 *</label><input type="date" class="fi2" id="fEnd"></div>
    </div>

    <div class="fg">
      <label>업무유형</label>
      <div class="pill-group" id="catPills"></div>
    </div>

    <div class="fg">
      <label>사업장 (복수 선택 가능)</label>
      <div class="pill-group" id="sitePills"></div>
    </div>

    <div class="fg"><label>담당자 / 메모</label><input class="fi2" id="fNote" maxlength="100" placeholder="예) 방사선 측정 포함"></div>

    <!-- 심사원 입력 -->
    <div class="fg">
      <label>심사원 — 환경 분야 (최대 4명, 쉼표로 구분)</label>
      <input class="fi2" id="fAuditorEnv" maxlength="80" placeholder="예) 홍길동, 김철수">
    </div>
    <div class="fg">
      <label>심사원 — 안전 분야 (최대 4명, 쉼표로 구분)</label>
      <input class="fi2" id="fAuditorSafe" maxlength="80" placeholder="예) 이영희, 박민준">
    </div>

    <div class="modal-ft">
      <button class="btn btn-danger" id="delBtn" style="display:none;margin-right:auto" onclick="deleteEvt()">삭제</button>
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEvt()">저장</button>
    </div>
  </div>
</div>

<!-- ── 기준정보 SETTINGS MODAL ── -->
<div class="overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal settings-modal" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <h2>⚙️ 기준정보 관리</h2>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="stab">
      <button class="stab-btn active" id="stab-title" onclick="switchStab('title')">제목</button>
      <button class="stab-btn" id="stab-cat" onclick="switchStab('cat')">업무유형</button>
      <button class="stab-btn" id="stab-site" onclick="switchStab('site')">사업장</button>
    </div>
    <!-- 제목 패널 -->
    <div class="stab-panel active" id="spanel-title">
      <div style="margin-bottom:8px;font-size:12px;color:var(--muted)">캘린더 상단에 표시되는 제목을 입력하세요.</div>
      <input class="fi2" id="titleInput" maxlength="40" placeholder="예) 매일유업 안전점검 일정"
        style="font-size:15px;font-weight:600;padding:10px 14px">
    </div>
    <!-- 업무유형 패널 -->
    <div class="stab-panel" id="spanel-cat">
      <div id="masterCatList"></div>
      <button class="master-add" onclick="addCat()">+ 업무유형 추가</button>
    </div>
    <!-- 사업장 패널 -->
    <div class="stab-panel" id="spanel-site">
      <div id="masterSiteList"></div>
      <button class="master-add" onclick="addSite()">+ 사업장 추가</button>
    </div>
    <div class="modal-ft" style="margin-top:16px">
      <button class="btn btn-primary" onclick="applySettings()">저장</button>
    </div>
  </div>
</div>

<!-- ── 비밀번호 확인 MODAL ── -->
<div class="overlay" id="pwOverlay" onclick="if(event.target===this)closePw()">
  <div class="modal" style="width:320px" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <h2>🔒 관리자 확인</h2>
      <button class="modal-close" onclick="closePw()">✕</button>
    </div>
    <div class="fg">
      <label>비밀번호</label>
      <input class="fi2" id="pwInput" type="password" placeholder="비밀번호를 입력하세요"
        onkeydown="if(event.key==='Enter')submitPw()">
    </div>
    <div id="pwError" style="font-size:12px;color:var(--red);margin-top:-8px;margin-bottom:10px;display:none">
      ❌ 비밀번호가 올바르지 않습니다.
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closePw()">취소</button>
      <button class="btn btn-primary" onclick="submitPw()">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── GOOGLE SHEETS API 설정 ──
const API_URL = 'https://script.google.com/macros/s/AKfycbzWfphYkr0O44up6y1V8hBz6WDWnNMEcPb-4L702iIBgX8lVmFn0XlbMkHIJQwQYfkR/exec';
const USE_SHEETS = true;

// ── LOCAL FALLBACK STORAGE ──
const S={
  get(k){try{return localStorage.getItem(k)}catch{return null}},
  set(k,v){try{localStorage.setItem(k,v)}catch{}}
};

// ── API 함수 (JSONP 방식 - CORS 우회) ──
function apiGet(){
  return new Promise((resolve,reject)=>{
    const cbName='_cb'+Date.now();
    const script=document.createElement('script');
    const timeout=setTimeout(()=>{
      delete window[cbName];
      document.body.removeChild(script);
      reject(new Error('timeout'));
    },10000);
    window[cbName]=function(data){
      clearTimeout(timeout);
      delete window[cbName];
      document.body.removeChild(script);
      resolve(data);
    };
    script.src=API_URL+'?action=getAll&callback='+cbName;
    script.onerror=()=>{clearTimeout(timeout);reject(new Error('script error'))};
    document.body.appendChild(script);
  });
}
async function apiPost(action,payload){
  try{
    const params=new URLSearchParams({action});
    Object.entries(payload).forEach(([k,v])=>{
      params.append(k, typeof v==='object'?JSON.stringify(v):String(v));
    });
    const script=document.createElement('script');
    const cbName='_save'+Date.now();
    window[cbName]=function(){delete window[cbName];document.body.removeChild(script)};
    script.src=API_URL+'?'+params.toString()+'&callback='+cbName;
    script.onerror=()=>{delete window[cbName];document.body.removeChild(script)};
    document.body.appendChild(script);
  }catch{}
}

// ── MINI CALENDAR ──
function renderMini(){
  const evDates=new Set(EVTS.flatMap(e=>{const ds=[];let d=pDate(e.start);const en=pDate(e.end);while(d<=en){ds.push(fmt(d.getFullYear(),d.getMonth(),d.getDate()));d.setDate(d.getDate()+1)}return ds}));
  const first=new Date(miniY,miniM,1).getDay();
  const dim=new Date(miniY,miniM+1,0).getDate();
  const dimp=new Date(miniY,miniM,0).getDate();
  const ts=todayStr();
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px;font-weight:600">
    <button onclick="miniPrev()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 6px;border-radius:4px">‹</button>
    <span>${miniY}.${String(miniM+1).padStart(2,'0')}</span>
    <button onclick="miniNext()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 6px;border-radius:4px">›</button>
  </div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center">
  ${['일','월','화','수','목','금','토'].map((d,i)=>`<div style="font-size:10px;font-weight:700;color:${i===0?'var(--red)':i===6?'#3b82f6':'var(--muted)'};padding:2px 0">${d}</div>`).join('')}`;
  for(let i=0;i<first;i++) h+=`<div style="font-size:11px;padding:3px;color:#c9cdd6">${dimp-first+1+i}</div>`;
  for(let d=1;d<=dim;d++){
    const ds=fmt(miniY,miniM,d),dow=new Date(miniY,miniM,d).getDay(),isT=ds===ts;
    const clr=dow===0?'var(--red)':dow===6?'#3b82f6':'var(--text)';
    const dot=evDates.has(ds)&&!isT?`<div style="width:4px;height:4px;border-radius:50%;background:var(--accent);margin:0 auto"></div>`:'';
    h+=`<div onclick="curY=${miniY};curM=${miniM};renderAll()" style="font-size:11px;padding:3px 1px;border-radius:4px;cursor:pointer;background:${isT?'var(--accent)':'transparent'};color:${isT?'#fff':clr}">${d}${dot}</div>`;
  }
  h+=`</div>`;
  document.getElementById('miniCal').innerHTML=h;
}
function miniPrev(){miniM--;if(miniM<0){miniM=11;miniY--;}renderMini()}
function miniNext(){miniM++;if(miniM>11){miniM=0;miniY++;}renderMini()}

function renderAuditorStats(){
  const el=document.getElementById('auditorStats');
  if(!el)return;

  // 모든 일정에서 심사원 집계
  const envCount={}, safeCount={};
  EVTS.forEach(e=>{
    (e.auditorEnv||[]).forEach(n=>{if(n)envCount[n]=(envCount[n]||0)+1});
    (e.auditorSafe||[]).forEach(n=>{if(n)safeCount[n]=(safeCount[n]||0)+1});
  });

  const envList=Object.entries(envCount).sort((a,b)=>b[1]-a[1]);
  const safeList=Object.entries(safeCount).sort((a,b)=>b[1]-a[1]);
  const maxCount=Math.max(1,...envList.map(x=>x[1]),...safeList.map(x=>x[1]));

  function makeGroup(label,color,list){
    if(!list.length) return '';
    const cards=list.map(([name,cnt])=>`
      <div class="auditor-card">
        <div class="auditor-name" title="${name}">${name}</div>
        <div style="display:flex;align-items:baseline;gap:3px">
          <div class="auditor-count" style="color:${color}">${cnt}</div>
          <div class="auditor-unit">회</div>
        </div>
        <div class="auditor-bar"><div class="auditor-bar-fill" style="width:${Math.round(cnt/maxCount*100)}%;background:${color}"></div></div>
      </div>`).join('');
    return `<div class="auditor-group">
      <div class="auditor-group-label" style="color:${color}">● ${label}</div>
      <div class="auditor-grid">${cards}</div>
    </div>`;
  }

  const html=(envList.length||safeList.length)
    ? makeGroup('환경 분야','#0e7490',envList)+makeGroup('안전 분야','#1e6fb5',safeList)
    : `<div style="font-size:12px;color:var(--muted);padding:4px">일정에 심사원을 등록하면 현황이 표시됩니다.</div>`;

  el.innerHTML=html;
}

  if(!start||!end){toast('날짜를 선택하세요.');return}
  if(start>end){toast('종료일이 시작일보다 빠릅니다.');return}
  if(editingId){
    const idx=EVTS.findIndex(e=>e.id===editingId);
    if(idx>=0)EVTS[idx]={...EVTS[idx],title,cat:selCat,sites:selSites,start,end,note,auditorEnv,auditorSafe};
    toast('일정이 수정되었습니다.');
  } else {
    EVTS.push({id:uid(),title,cat:selCat,sites:selSites,start,end,note,auditorEnv,auditorSafe});
    toast('일정이 추가되었습니다.');
  }
  saveEvts();closeModal();renderAll();
}
function deleteEvt(){if(!editingId)return;EVTS=EVTS.filter(e=>e.id!==editingId);saveEvts();closeModal();renderAll();toast('삭제되었습니다.')}

// ── DETAIL POPUP ──
function showDetail(id,ev){
  const e=EVTS.find(x=>x.id===id);if(!e)return;
  detailId=id;
  const cat=CATS.find(c=>c.id===e.cat);
  const siteLabels=(e.sites||[]).map(sid=>SITES.find(s=>s.id===sid)).filter(Boolean);

  document.getElementById('dpTitle').innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${cat?.dot||'#888'};flex-shrink:0"></span>${e.title}`;

  const badges=document.getElementById('dpBadges');
  badges.innerHTML='';
  if(cat&&!cat.fixed){
    const b=document.createElement('span');b.className='dp-badge';b.style.background=cat.dot;b.textContent=cat.label;badges.appendChild(b);
  }
  siteLabels.forEach(site=>{
    const b=document.createElement('span');b.className='dp-badge';b.style.background=site.dot;b.textContent=site.label;badges.appendChild(b);
  });

  document.getElementById('dpDate').textContent=`📅 ${e.start}${e.start!==e.end?' ~ '+e.end:''}`;
  document.getElementById('dpNote').textContent=e.note?`📝 ${e.note}`:'';

  const pop=document.getElementById('detailPop');pop.classList.add('open');
  const r=ev.target.getBoundingClientRect();
  let top=r.bottom+8,left=r.left;
  if(left+270>window.innerWidth)left=window.innerWidth-278;
  if(top+180>window.innerHeight)top=r.top-192;
  pop.style.top=top+'px';pop.style.left=left+'px';
}
// ── DRAG TO SELECT ──
function attachDrag(bodyEl){
  let ds=null,de=null,dragging=false;
  bodyEl.addEventListener('mousedown',e=>{
    const cell=e.target.closest('.cal-cell');
    if(!cell||!cell.dataset.date)return;
    if(e.target.closest('.ev-bar'))return;
    if(e.target.closest('button'))return;
    dragging=true;ds=cell.dataset.date;de=cell.dataset.date;
    highlight(bodyEl,ds,de);e.preventDefault();
  });
  bodyEl.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const cell=e.target.closest('.cal-cell');
    if(!cell||!cell.dataset.date)return;
    de=cell.dataset.date;highlight(bodyEl,ds,de);
  });
  const finish=()=>{
    if(!dragging)return;dragging=false;clearHL(bodyEl);
    if(ds&&de){const lo=ds<de?ds:de,hi=ds<de?de:ds;openAdd(lo,hi);}
    ds=null;de=null;
  };
  bodyEl.addEventListener('mouseup',finish);
  document.addEventListener('mouseup',()=>{if(dragging)finish()},{passive:true});
}
function highlight(body,s,e){const lo=s<e?s:e,hi=s<e?e:s;body.querySelectorAll('.cal-cell').forEach(c=>{const d=c.dataset.date;c.classList.toggle('dragging',!!(d&&d>=lo&&d<=hi))})}
function clearHL(body){body.querySelectorAll('.cal-cell').forEach(c=>c.classList.remove('dragging'))}

// ── FILTER EVENTS ──
function getFiltered(){
  return EVTS.filter(e=>{
    const catOk=activeCat==='all'||e.cat===activeCat;
    const siteOk=activeSite==='site-all'||(e.sites||[]).includes(activeSite);
    return catOk&&siteOk;
  });
}

// ── BUILD CALENDAR GRID ──
function buildGrid(year,month,bodyEl){
  const first=new Date(year,month,1).getDay();
  const dim=new Date(year,month+1,0).getDate();
  const dimp=new Date(year,month,0).getDate();
  const ts=todayStr();
  const filtered=getFiltered();
  const weeks=Math.ceil((first+dim)/7);

  for(let row=0;row<weeks;row++){
    const wCells=[];
    for(let col=0;col<7;col++){
      const idx=row*7+col,dn=idx-first+1;
      let y=year,m=month,d=dn,other=false;
      if(dn<1){m=month-1;if(m<0){m=11;y--}d=dimp-first+1+idx;other=true}
      else if(dn>dim){m=month+1;if(m>11){m=0;y++}d=dn-dim;other=true}
      wCells.push({y,m,d,ds:fmt(y,m,d),other,col});
    }
    const wS=pDate(wCells[0].ds),wE=pDate(wCells[6].ds);
    const wEvts=filtered.filter(e=>{const s=pDate(e.start),en=pDate(e.end);return s<=wE&&en>=wS})
      .sort((a,b)=>(pDate(b.end)-pDate(b.start))-(pDate(a.end)-pDate(a.start)));

    const slots={},evtSlot={};
    wEvts.forEach(e=>{
      const s=pDate(e.start),en=pDate(e.end);
      const sc=Math.max(0,Math.round((s-wS)/86400000));
      const ec=Math.min(6,Math.round((en-wS)/86400000));
      let slot=0;
      outer:while(true){for(let c=sc;c<=ec;c++)if((slots[c]||[])[slot]){slot++;continue outer}break}
      evtSlot[e.id]={slot,sc,ec};
      for(let c=sc;c<=ec;c++){if(!slots[c])slots[c]=[];slots[c][slot]=e.id}
    });

    const frag=document.createDocumentFragment();
    wCells.forEach(({y,m,d,ds,other,col})=>{
      const dow=new Date(y,m,d).getDay();
      const isHol=!!HOL[ds];
      const cell=document.createElement('div');
      cell.className='cal-cell'+(other?' other-month':'')+(ds===ts?' is-today':'')+(dow===0||isHol?' is-sun':dow===6?' is-sat':'');
      cell.dataset.date=ds;

      const top=document.createElement('div');top.className='cell-top';
      const de2=document.createElement('div');de2.className='cell-date';de2.textContent=d;
      top.appendChild(de2);
      if(isHol){const hl=document.createElement('div');hl.className='cell-holiday';hl.textContent=HOL[ds];top.appendChild(hl)}
      cell.appendChild(top);

      const evWrap=document.createElement('div');evWrap.className='cell-events';
      const colEvts=wEvts.filter(e=>{const{sc,ec}=evtSlot[e.id];return col>=sc&&col<=ec}).sort((a,b)=>evtSlot[a.id].slot-evtSlot[b.id].slot);
      let lastSlot=-1;
      colEvts.forEach(e=>{
        const{slot,sc,ec}=evtSlot[e.id];
        for(let s=lastSlot+1;s<slot;s++){const sp=document.createElement('div');sp.style.cssText='height:20px;margin-bottom:2px';evWrap.appendChild(sp)}
        lastSlot=slot;
        const cat=CATS.find(c=>c.id===e.cat);
        const isS=col===sc,isE=col===ec;
        const bar=document.createElement('div');
        bar.className='ev-bar '+(isS&&isE?'span-se':isS?'span-s':isE?'span-e':'span-m');
        bar.style.background=cat?.dot||'#888';

        if(isS){
          // 사업장 뱃지 (첫 번째만)
          const firstSite=SITES.find(s=>(e.sites||[]).includes(s.id)&&!s.fixed);
          if(firstSite&&(e.sites||[]).length>0){
            const badge=document.createElement('span');badge.className='ev-site-badge';
            badge.textContent=(e.sites||[]).length>1?`${firstSite.label}+${(e.sites||[]).length-1}`:firstSite.label;
            bar.appendChild(badge);
          }
          const titleSpan=document.createElement('span');titleSpan.textContent=e.title;titleSpan.style.overflow='hidden';titleSpan.style.textOverflow='ellipsis';
          bar.appendChild(titleSpan);
        }
        bar.title=e.title+(e.sites?.length?` [${(e.sites||[]).map(sid=>SITES.find(s=>s.id===sid)?.label||sid).join(', ')}]`:'');
        bar.addEventListener('click',ev=>{ev.stopPropagation();openEdit(e.id)});
        evWrap.appendChild(bar);
      });
      cell.appendChild(evWrap);
      cell.addEventListener('click',()=>{});
      frag.appendChild(cell);
    });
    bodyEl.appendChild(frag);
  }
  attachDrag(bodyEl);
}

// ── VIEWS ──
function setView(v){
  currentView=v;
  ['Month','Dual','List'].forEach(n=>{const el=document.getElementById('v'+n);if(el)el.classList.toggle('active',v===n.toLowerCase())});
  renderMain();
}
function renderMain(){
  if(currentView==='month')renderMonth();
  else if(currentView==='dual')renderDual();
  else renderList();
}
function makeCalWrap(year,month,showLabel){
  const wrap=document.createElement('div');wrap.className='cal-wrap';wrap.style.flex='1';wrap.style.minWidth='0';
  if(showLabel){const lbl=document.createElement('div');lbl.className='dual-label';lbl.textContent=`${year}년 ${month+1}월`;wrap.appendChild(lbl);}
  const hd=document.createElement('div');hd.className='cal-head';
  hd.innerHTML=['일','월','화','수','목','금','토'].map(d=>`<div class="cal-head-cell">${d}</div>`).join('');
  const body=document.createElement('div');body.className='cal-body';
  wrap.appendChild(hd);wrap.appendChild(body);
  return{wrap,body};
}
function renderMonth(){
  document.getElementById('monthTitle').textContent=`${curY}년 ${curM+1}월`;
  const con=document.getElementById('calContainer');con.style.display='';con.innerHTML='';
  const{wrap,body}=makeCalWrap(curY,curM,false);
  wrap.style.width='100%';con.appendChild(wrap);buildGrid(curY,curM,body);
}
function renderDual(){
  let y2=curY,m2=curM+1;if(m2>11){m2=0;y2++}
  document.getElementById('monthTitle').textContent=`${curY}년 ${curM+1}월 — ${y2}년 ${m2+1}월`;
  const con=document.getElementById('calContainer');con.innerHTML='';con.style.display='flex';con.style.gap='12px';
  [{y:curY,m:curM},{y:y2,m:m2}].forEach(({y,m})=>{
    const{wrap,body}=makeCalWrap(y,m,true);con.appendChild(wrap);buildGrid(y,m,body);
  });
}
function renderList(){
  document.getElementById('monthTitle').textContent=`${curY}년 ${curM+1}월`;
  const con=document.getElementById('calContainer');con.style.display='';con.innerHTML='';
  const ms=`${curY}-${String(curM+1).padStart(2,'0')}`;
  const filtered=getFiltered().filter(e=>e.start.startsWith(ms)||e.end.startsWith(ms)).sort((a,b)=>a.start.localeCompare(b.start));
  const wrap=document.createElement('div');wrap.className='cal-wrap';
  if(!filtered.length){wrap.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">이번 달 일정이 없습니다.</div>'}
  else filtered.forEach(e=>{
    const cat=CATS.find(c=>c.id===e.cat);
    const siteObjs=(e.sites||[]).map(sid=>SITES.find(s=>s.id===sid)).filter(Boolean);
    const row=document.createElement('div');row.className='list-row';
    const siteBadgesHTML=siteObjs.map(s=>`<span class="list-badge" style="background:${s.dot}">${s.label}</span>`).join('');
    const catBadgeHTML=cat&&!cat.fixed?`<span class="list-badge" style="background:${cat.dot}">${cat.label}</span>`:'';
    row.innerHTML=`
      <div class="list-badges">${catBadgeHTML}${siteBadgesHTML}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px">${e.title}</div>
        ${e.note?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${e.note}</div>`:''}
      </div>
      <div style="font-size:12px;color:var(--muted);white-space:nowrap">${e.start}${e.start!==e.end?' ~ '+e.end:''}</div>`;
    row.addEventListener('click',()=>openEdit(e.id));
    wrap.appendChild(row);
  });
  con.appendChild(wrap);
}

// ── NAV ──
function prevM(){curM--;if(curM<0){curM=11;curY--}renderAll()}
function nextM(){curM++;if(curM>11){curM=0;curY++}renderAll()}
function goToday(){curY=TODAY.getFullYear();curM=TODAY.getMonth();miniY=curY;miniM=curM;renderAll()}

// ── SHARE / EXPORT ──
function shareCalendar(){
  const data=btoa(encodeURIComponent(JSON.stringify({evts:EVTS,cats:CATS,sites:SITES})));
  const url=location.href.split('?')[0]+'?data='+data;
  document.getElementById('shareUrl').value=url;
  navigator.clipboard?.writeText(url).catch(()=>{});
  toast('🔗 공유 링크가 복사되었습니다!');
}
function copyShare(){const v=document.getElementById('shareUrl').value;if(v){navigator.clipboard?.writeText(v);toast('복사되었습니다!')}else shareCalendar()}
function exportICS(){
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Schedule Calendar//KR\r\n';
  EVTS.forEach(e=>{
    const siteStr=(e.sites||[]).map(sid=>SITES.find(s=>s.id===sid)?.label||sid).join(', ');
    ics+='BEGIN:VEVENT\r\n';
    ics+=`DTSTART;VALUE=DATE:${e.start.replace(/-/g,'')}\r\n`;
    const ed=new Date(pDate(e.end));ed.setDate(ed.getDate()+1);
    ics+=`DTEND;VALUE=DATE:${fmt(ed.getFullYear(),ed.getMonth(),ed.getDate()).replace(/-/g,'')}\r\n`;
    ics+=`SUMMARY:${e.title}${siteStr?` [${siteStr}]`:''}\r\n`;
    if(e.note)ics+=`DESCRIPTION:${e.note}\r\n`;
    ics+='END:VEVENT\r\n';
  });
  ics+='END:VCALENDAR';
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download='schedule.ics';a.click();toast('📤 ICS 파일 다운로드');
}

// ── RENDER ALL ──
function renderAll(){
  renderMini();renderFilterLists();renderMain();
  document.getElementById('shareUrl').value='';
}

// ── INIT ──
async function init(){
  // 1. URL 파라미터 처리
  try{
    const p=new URLSearchParams(location.search).get('data');
    if(p){
      const parsed=JSON.parse(decodeURIComponent(atob(p)));
      if(parsed.evts)EVTS=parsed.evts;
      if(parsed.cats)CATS=parsed.cats;
      if(parsed.sites)SITES=parsed.sites;
      saveEvts();saveCats();saveSites();
    }
  }catch{}

  // 2. 로컬 저장된 타이틀 적용
  const t=S.get('cal_title');
  if(t){document.getElementById('logoTitle').textContent=t;document.title=t;}

  // 3. 로컬 데이터로 즉시 렌더링 (화면 먼저 보여주기)
  renderAll();

  // 4. 백그라운드에서 Sheets 데이터 로드 (성공하면 화면 갱신)
  if(USE_SHEETS){
    showLoading(true);
    try{
      const d=await apiGet();
      let changed=false;

      if(d&&d.evts!==undefined){
        // Sheets label/dot 필드 정규화 (name→label, color→dot 방어)
        const normalize=(arr)=>arr.map(x=>({
          ...x,
          label:x.label||x.name||x.id,
          dot:x.dot||x.color||'#888'
        }));

        EVTS=d.evts||[];
        S.set('cal_evts',JSON.stringify(EVTS));

        if(d.cats&&d.cats.length>0){
          CATS=[DCATS[0],...normalize(d.cats)];
          S.set('cal_cats',JSON.stringify(CATS));
        }
        if(d.sites&&d.sites.length>0){
          SITES=[DSITES[0],...normalize(d.sites)];
          S.set('cal_sites',JSON.stringify(SITES));
        }
        if(d.title){
          document.getElementById('logoTitle').textContent=d.title;
          document.title=d.title;
          S.set('cal_title',d.title);
        }
        changed=true;
      }
      if(changed) renderAll();
    }catch(err){
      console.error('Sheets 로드 실패:', err);
      // 로컬 데이터가 이미 표시되어 있으므로 별도 처리 불필요
    }
    showLoading(false);
  }
}
init();

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeSettings();closeDetail()}
  if(!document.getElementById('overlay').classList.contains('open')&&!document.getElementById('settingsOverlay').classList.contains('open')){
    if(e.key==='ArrowLeft')prevM();
    if(e.key==='ArrowRight')nextM();
  }
});
